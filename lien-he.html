        <h2>Thông tin đặt hàng</h2>

            <input type="text" placeholder="Nhập họ và tên">

            <label>Tên hàng cần đặt:</label>
            <input type="text" placeholder="Ví dụ: Tủ quần áo gỗ">

            <button type="submit">Gửi đơn đặt hàng</button>
        </form>
    </section>
